name: Frontend CI/CD

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: detect-frontend
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping frontend job because frontend/package-lock.json is missing."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect-frontend.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - if: steps.detect-frontend.outputs.exists == 'true'
        run: |
          cd frontend
          npm ci
      - if: steps.detect-frontend.outputs.exists == 'true'
        run: |
          cd frontend
          npm test -- --watch=false
      - if: steps.detect-frontend.outputs.exists == 'true'
        run: |
          cd frontend
          npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('frontend/package-lock.json') != ''
    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
