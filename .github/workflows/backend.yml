name: Backend CI/CD

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/missing-pieces-api

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: detect-backend
        run: |
          if find backend -type f \( -name '*.sln' -o -name '*.csproj' \) | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping backend build/test because no .sln or .csproj was found under backend/."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-dotnet@v4
        if: steps.detect-backend.outputs.exists == 'true'
        with:
          dotnet-version: '8.0.x'
      - if: steps.detect-backend.outputs.exists == 'true'
        run: |
          cd backend
          dotnet restore
      - if: steps.detect-backend.outputs.exists == 'true'
        run: |
          cd backend
          dotnet build --configuration Release --no-restore
      - if: steps.detect-backend.outputs.exists == 'true'
        run: |
          cd backend
          dotnet test --configuration Release --no-build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('backend/Dockerfile') != ''
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
