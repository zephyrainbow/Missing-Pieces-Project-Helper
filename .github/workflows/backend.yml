name: Backend CI/CD

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - '.github/workflows/backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/missing-pieces-api

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: ${{ hashFiles('backend/*.sln', 'backend/**/*.csproj') == '' }}
        run: echo "::notice::Skipping backend build/test because no .sln or .csproj was found under backend/."
      - uses: actions/setup-dotnet@v4
        if: ${{ hashFiles('backend/*.sln', 'backend/**/*.csproj') != '' }}
        with:
          dotnet-version: '8.0.x'
      - if: ${{ hashFiles('backend/*.sln', 'backend/**/*.csproj') != '' }}
        run: |
          cd backend
          dotnet restore
      - if: ${{ hashFiles('backend/*.sln', 'backend/**/*.csproj') != '' }}
        run: |
          cd backend
          dotnet build --configuration Release --no-restore
      - if: ${{ hashFiles('backend/*.sln', 'backend/**/*.csproj') != '' }}
        run: |
          cd backend
          dotnet test --configuration Release --no-build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('backend/Dockerfile') != ''
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
